<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オクリンク＋ (ホワイトボード＆カードモード)</title>
    <link rel="icon" href="oklink.png">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- ボードを画像化して先生に送るための魔法のライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <style>
        /* ==========================================
           🎨 基本デザイン
           ========================================== */
        body { font-family: 'Zen Maru Gothic', sans-serif; background: #e9ecef; margin: 0; color: #333; overflow: hidden; height: 100vh; display: flex; flex-direction: column;}
        
        /* ヘッダー */
        .header { background: #f39c12; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 100;}
        .header h1 { margin: 0; font-size: 20px; display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 32px; height: 32px; background: #fff; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: #f39c12; }
        
        /* 先生用コントロール（右上に配置） */
        .teacher-controls { display: none; gap: 10px; }
        .btn-top { padding: 8px 15px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-family: 'Zen Maru Gothic'; box-shadow: 0 2px 0 rgba(0,0,0,0.2); transition: 0.2s;}
        .btn-top:active { transform: translateY(2px); box-shadow: none; }
        .btn-monitor { background: #2ecc71; color: white; }
        .btn-lock { background: #e74c3c; color: white; }

        /* ログイン画面 */
        #login-screen { position: absolute; top:0; left:0; width:100%; height:100%; background: #f4f5f7; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { background: white; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        /* ==========================================
           📝 ホワイトボードとカード（付箋）
           ========================================== */
        #board-container { flex: 1; position: relative; overflow: hidden; background: #fdfdfd; background-image: radial-gradient(#d5d8dc 1px, transparent 1px); background-size: 20px 20px; }
        
        .card { position: absolute; min-width: 150px; min-height: 100px; background: #fffcf0; border-radius: 8px; box-shadow: 2px 4px 10px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #f1c40f; }
        .card-header { background: #f1c40f; height: 20px; cursor: grab; display: flex; justify-content: space-between; align-items: center; padding: 2px 8px; }
        .card-header:active { cursor: grabbing; }
        .delete-btn { color: #c0392b; cursor: pointer; font-size: 14px; font-weight: bold; background: white; border-radius: 50%; width: 16px; height: 16px; text-align: center; line-height: 16px; }
        .card-content { flex: 1; padding: 5px; display: flex; justify-content: center; align-items: center; }
        
        /* カードの中身の種類 */
        .card textarea { width: 100%; height: 100%; border: none; background: transparent; resize: none; font-family: 'Zen Maru Gothic'; font-size: 16px; outline: none; }
        .card img { max-width: 100%; max-height: 100%; object-fit: contain; pointer-events: none; }
        .card a { color: #3498db; text-decoration: none; font-weight: bold; font-size: 18px; word-break: break-all; padding: 10px; text-align: center; }
        .card a:hover { text-decoration: underline; }

        /* ==========================================
           🛠️ 下部ツールバー (絵だけでわかる)
           ========================================== */
        .bottom-toolbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 20px; border-radius: 40px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: flex; gap: 15px; z-index: 100; border: 2px solid #ecf0f1; }
        .tool-btn { background: none; border: none; font-size: 28px; cursor: pointer; transition: 0.2s; padding: 5px; border-radius: 50%; width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; }
        .tool-btn:hover { background: #f1f2f6; transform: scale(1.1); }
        .tool-btn:active { transform: scale(0.9); }
        
        .submit-btn { background: #e67e22; color: white; border: none; border-radius: 30px; padding: 0 20px; font-size: 18px; font-weight: bold; cursor: pointer; margin-left: 10px; font-family: 'Zen Maru Gothic'; box-shadow: 0 3px 0 #d35400; }
        .submit-btn:active { transform: translateY(3px); box-shadow: none; }

        /* ==========================================
           👀 ライブモニタリング・モーダル (先生専用)
           ========================================== */
        #monitor-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 1000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #f4f5f7; width: 90%; max-width: 1200px; height: 85%; border-radius: 15px; padding: 20px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #ccc; padding-bottom: 10px;}
        
        .monitor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; overflow-y: auto; flex: 1; padding-right: 10px; }
        .monitor-card { background: #fff; border: 2px solid #ddd; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .monitor-card img { width: 100%; height: 140px; object-fit: contain; background: white; border-bottom: 1px solid #eee; }
        .monitor-name { padding: 8px; text-align: center; font-size: 14px; font-weight: bold; margin: 0; background: #e8f8f5; color: #16a085; }

        /* 🔒 ロックオーバーレイ */
        #lock-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 999; display: none; justify-content: center; align-items: center; flex-direction: column; color: white; text-align: center; }
    </style>
</head>
<body>

    <!-- 🔒 画面ロック -->
    <div id="lock-overlay">
        <h1 style="color: #f1c40f; font-size: 40px; margin-bottom:10px;">🔒 ロック中</h1>
        <p style="font-size: 24px;">先生のお話を聞きましょう👀👂</p>
    </div>

    <!-- ログイン画面 -->
    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: #e67e22;">授業に参加する</h2>
            <button class="btn-top" style="background:#3498db; color:white; font-size: 18px; padding: 15px 30px;" onclick="login()">Googleでログイン</button>
        </div>
    </div>

    <!-- ヘッダー -->
    <div class="header">
        <h1><span class="logo-icon">🌱</span> オクリンク＋ ボード</h1>
        <div style="display:flex; align-items:center; gap:20px;">
            <div id="user-info" style="font-weight:bold;"></div>
            
            <!-- 👨‍🏫 先生専用コントロール -->
            <div id="teacher-controls" class="teacher-controls">
                <button class="btn-top btn-lock" id="btn-lock-toggle" onclick="toggleLock()">🔓 ロックする</button>
                <button class="btn-top btn-monitor" onclick="openMonitorModal()">👀 ライブモニタリング</button>
            </div>
        </div>
    </div>

    <!-- 📝 ホワイトボード (共通) -->
    <div id="board-container">
        <!-- ここに付箋（カード）が追加されていきます -->
    </div>

    <!-- 🛠️ 下部ツールバー (絵だけでわかる分類ボタン) -->
    <div class="bottom-toolbar">
        <button class="tool-btn" title="テキストをはる" onclick="addTextCard()">📝</button>
        <button class="tool-btn" title="写真をはる" onclick="document.getElementById('gallery-input').click()">🖼️</button>
        <button class="tool-btn" title="カメラでとる" onclick="document.getElementById('camera-input').click()">📷</button>
        <button class="tool-btn" title="リンクをはる" onclick="addLinkCard()">🔗</button>
        
        <!-- 隠しファイル入力 -->
        <input type="file" id="gallery-input" accept="image/*" style="display:none" onchange="addImageCard(event)">
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="addImageCard(event)">

        <!-- 生徒のみ表示される提出ボタン -->
        <button id="submit-btn" class="submit-btn" onclick="submitBoard()">✨ 提出</button>
    </div>

    <!-- 👀 ライブモニタリング・モーダル (ど真ん中に出る表) -->
    <div id="monitor-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 style="margin:0; color:#2c3e50;">👀 ライブモニタリング (みんなのボード)</h2>
                <button class="btn-top" style="background:#7f8c8d; color:white;" onclick="closeMonitorModal()">❌ 閉じる</button>
            </div>
            <div id="monitor-grid" class="monitor-grid">
                <p style="color:#7f8c8d; text-align:center; grid-column: 1 / -1;">生徒が作業を始めると、ここに表示されます。</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB7jGlKT6LKGxIqWdJrvxuT8Fj6oJ3U_5A",
            authDomain: "oklink-plus-support.firebaseapp.com",
            databaseURL: "https://oklink-plus-support-default-rtdb.firebaseio.com",
            projectId: "oklink-plus-support",
            storageBucket: "oklink-plus-support.firebasestorage.app",
            messagingSenderId: "698126390011",
            appId: "1:698126390011:web:b797298890bee20702d65e"
        };
        const TEACHER_EMAIL = "ishiinopasokon8610@gmail.com"; 

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const auth = firebase.auth();
        
        let zIndexCounter = 10;
        let isTeacherLocked = false;

        // ==========================================
        // 🚪 ログインと画面の切り替え
        // ==========================================
        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch((error) => alert("ログインエラー: " + error.message));
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                
                if (user.email === TEACHER_EMAIL) {
                    // 👨‍🏫 先生の画面
                    document.getElementById('user-info').innerText = `👨‍🏫 先生`;
                    document.getElementById('teacher-controls').style.display = 'flex';
                    document.getElementById('submit-btn').style.display = 'none'; // 先生は提出ボタン不要
                    initTeacherListeners();
                } else {
                    // 👦👧 生徒の画面
                    document.getElementById('user-info').innerText = `👤 ${user.displayName}`;
                    startAutoMonitoring(); // ボードの自動送信を開始
                }

                // 生徒向けロック監視
                db.ref('live_control/lock_screen').on('value', (snap) => {
                    const isLocked = snap.val();
                    if (user.email !== TEACHER_EMAIL) {
                        document.getElementById('lock-overlay').style.display = isLocked ? 'flex' : 'none';
                    } else {
                        // 先生のボタンの文字を変える
                        isTeacherLocked = isLocked;
                        const btn = document.getElementById('btn-lock-toggle');
                        if(isLocked) {
                            btn.innerText = "🔒 ロック解除";
                            btn.style.background = "#7f8c8d";
                        } else {
                            btn.innerText = "🔓 ロックする";
                            btn.style.background = "#e74c3c";
                        }
                    }
                });
            }
        });

        // ==========================================
        // 👨‍🏫 先生専用の機能
        // ==========================================
        function toggleLock() {
            db.ref('live_control/lock_screen').set(!isTeacherLocked);
        }

        function openMonitorModal() {
            document.getElementById('monitor-modal').style.display = 'flex';
        }

        function closeMonitorModal() {
            document.getElementById('monitor-modal').style.display = 'none';
        }

        function initTeacherListeners() {
            // モニタリングの受信
            db.ref('monitor_screens').on('value', (snap) => {
                const grid = document.getElementById('monitor-grid');
                grid.innerHTML = ''; 
                let hasData = false;
                
                snap.forEach(child => {
                    const data = child.val();
                    if(Date.now() - data.timestamp < 15000) { // 15秒以内のデータのみ
                        hasData = true;
                        grid.innerHTML += `
                            <div class="monitor-card">
                                <img src="${data.image}">
                                <p class="monitor-name">${data.name}</p>
                            </div>
                        `;
                    }
                });
                if(!hasData) grid.innerHTML = '<p style="color:#7f8c8d; text-align:center; grid-column: 1/-1;">現在作業している生徒はいません。</p>';
            });
        }

        // ==========================================
        // 📝 カード（付箋）を作る機能
        // ==========================================
        const board = document.getElementById('board-container');

        // カードの共通枠組みを作る関数
        function createCardBase() {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.left = (Math.random() * 50 + 50) + 'px';
            card.style.top = (Math.random() * 50 + 50) + 'px';
            card.style.zIndex = ++zIndexCounter;

            const header = document.createElement('div');
            header.className = 'card-header';
            header.innerHTML = `<span></span> <span class="delete-btn" onclick="this.parentElement.parentElement.remove()">✕</span>`;
            
            const content = document.createElement('div');
            content.className = 'card-content';

            card.appendChild(header);
            card.appendChild(content);
            board.appendChild(card);
            
            makeDraggable(card);
            return { card, content };
        }

        // 📝 テキストカード
        function addTextCard() {
            const { content } = createCardBase();
            const textarea = document.createElement('textarea');
            textarea.placeholder = "ここに文字を入力...";
            content.appendChild(textarea);
        }

        // 🖼️ 写真/カメラカード
        function addImageCard(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const { content } = createCardBase();
                const img = document.createElement('img');
                img.src = e.target.result;
                content.appendChild(img);
            }
            reader.readAsDataURL(file);
            event.target.value = ""; // リセット
        }

        // 🔗 リンクカード
        function addLinkCard() {
            const url = prompt("リンク先のURL（http〜）を貼り付けてください:");
            if (url) {
                const title = prompt("リンクの名前を入力してください（例：参考サイト）:") || "リンクを開く";
                const { content } = createCardBase();
                const a = document.createElement('a');
                a.href = url;
                a.target = "_blank"; // 新しいタブで開く
                a.innerText = "🌐 " + title;
                content.appendChild(a);
            }
        }

        // ==========================================
        // 👆 カードを指やマウスで動かす機能
        // ==========================================
        function makeDraggable(element) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            const header = element.querySelector('.card-header');
            
            header.onmousedown = dragMouseDown;
            header.ontouchstart = dragTouchStart;

            function dragMouseDown(e) {
                e.preventDefault();
                element.style.zIndex = ++zIndexCounter;
                pos3 = e.clientX; pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
                pos3 = e.clientX; pos4 = e.clientY;
                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
            }

            function dragTouchStart(e) {
                const touch = e.touches[0];
                element.style.zIndex = ++zIndexCounter;
                pos3 = touch.clientX; pos4 = touch.clientY;
                document.ontouchend = closeDragElement;
                document.ontouchmove = elementTouchDrag;
            }

            function elementTouchDrag(e) {
                const touch = e.touches[0];
                pos1 = pos3 - touch.clientX; pos2 = pos4 - touch.clientY;
                pos3 = touch.clientX; pos4 = touch.clientY;
                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null; document.onmousemove = null;
                document.ontouchend = null; document.ontouchmove = null;
            }
        }

        // ==========================================
        // 🚀 生徒のボードを先生に送る（自動送信）
        // ==========================================
        function startAutoMonitoring() {
            setInterval(() => {
                const user = auth.currentUser;
                if (user && !document.hidden && document.getElementById('lock-overlay').style.display !== 'flex') {
                    // html2canvasを使って、ボード全体をパシャッと画像化！
                    html2canvas(document.getElementById('board-container'), {
                        backgroundColor: "#fdfdfd",
                        scale: 0.5 // 軽くするために解像度を下げる
                    }).then(canvas => {
                        db.ref('monitor_screens/' + user.uid).update({
                            name: user.displayName,
                            image: canvas.toDataURL('image/jpeg', 0.5),
                            timestamp: Date.now()
                        });
                    });
                }
            }, 3000); // 3秒ごとに送信（負荷を考慮）
        }

        // 生徒の提出ボタン
        function submitBoard() {
            html2canvas(document.getElementById('board-container'), {
                backgroundColor: "#fdfdfd", scale: 1
            }).then(canvas => {
                alert("✨ ボードを提出しました！");
                // ※提出先の機能が必要な場合はここに追加します
            });
        }
    </script>
</body>
</html>
